<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SaloneDrive Community</title>

<link rel="stylesheet" href="index.html">
<header>
  <h1>🚦Community</h1>
</header>

<section class="create-post">

<input
type="text"
id="username"
placeholder="Your Name">

<select id="category">

<option>Traffic Update</option>

<option>Accident Report</option>

<option>Road Condition</option>

<option>Question</option>

<option>News</option>

</select>

<textarea
id="message"

</textarea>

<button id="postBtn">
Post
</button>

</section>

<section>

<input
type="text"
id="searchInput"
placeholder="Search posts">

</section>

<section id="posts">

</section>
